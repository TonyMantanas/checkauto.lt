<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>checkauto.lt | Jau greitai</title>
  <meta name="description" content="checkauto.lt | nepriklausoma automobilių patikra prieš pirkimą. Svetainė ruošiama.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg:          #ffffff;
      --color-text:        #1d1d1f;
      --color-text-secondary: #6e6e73;
      --color-accent:      #0071e3;
      --color-border-light:#e8e8ed;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      font-family: var(--font-family);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.8s ease-out both;
    }

    .logo {
      font-size: clamp(1.5rem, 1.2rem + 1.5vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--color-text);
      margin-bottom: 3rem;
    }

    .logo span {
      color: var(--color-accent);
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-accent);
      background: rgba(0, 113, 227, 0.08);
      border: 1px solid rgba(0, 113, 227, 0.15);
      padding: 0.35rem 1rem;
      border-radius: 100px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.25rem, 1.6rem + 2.5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1.25rem;
      max-width: 600px;
    }

    .subtitle {
      font-size: clamp(1rem, 0.9rem + 0.4vw, 1.2rem);
      color: var(--color-text-secondary);
      line-height: 1.6;
      max-width: 440px;
    }

    footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.8125rem;
      color: var(--color-text-secondary);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="content">
    <div class="logo">check<span>auto</span>.lt</div>
    <div class="badge">Jau greitai</div>
    <h1>Nepriklausoma automobilių patikra</h1>
    <p class="subtitle">Profesionali techninė patikra prieš pirkimą, kad sprendimą priimtumėte ramia galva. Svetainė kuriama.</p>
  </div>

  <footer>© 2026 checkauto.lt</footer>

</body>
</html>
